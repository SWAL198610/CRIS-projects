<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Projects</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0078d4;
      --teal:   #0d7e74;
      --teal-lt:#e6f4f2;
      --slate:  #4a5568;
      --rule:   #d0dce8;
      --bg:     #f7f9fc;
      --white:  #ffffff;
    }

    body { font-family: 'Nunito Sans', Arial, sans-serif; background: var(--bg); color: var(--navy); min-height: 100vh; }

    header { background: var(--navy); padding: 2.5rem 2rem 2rem; }
    .header-inner { max-width: 900px; margin: 0 auto; }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .header-logo {
      height: 90px;
      width: auto;
      background: white;
      border-radius: 6px;
      padding: 8px 12px;
      flex-shrink: 0;
    }

    .eyebrow { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.6rem; }
    header h1 { font-family: 'Nunito Sans', Arial, sans-serif; font-size: clamp(1.8rem, 4vw, 2.8rem); color: var(--white); line-height: 1.15; font-weight: 400; }
    .subtitle { margin-top: 0.6rem; font-size: 0.9rem; color: #94abbe; font-weight: 300; }

    main { max-width: 900px; margin: 0 auto; padding: 2rem 2rem 4rem; }

    .controls { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .search-wrap { position: relative; flex: 1; min-width: 180px; }
    .search-wrap svg { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--slate); pointer-events: none; }
    input[type="search"] { width: 100%; padding: 0.55rem 0.75rem 0.55rem 2.2rem; border: 1px solid var(--rule); border-radius: 6px; font-family: inherit; font-size: 0.875rem; background: var(--white); color: var(--navy); outline: none; transition: border-color 0.15s; }
    input[type="search"]:focus { border-color: var(--teal); }
    select { padding: 0.55rem 0.75rem; border: 1px solid var(--rule); border-radius: 6px; font-family: inherit; font-size: 0.875rem; background: var(--white); color: var(--navy); outline: none; cursor: pointer; }
    select:focus { border-color: var(--teal); }

    .count { font-size: 0.8rem; color: var(--slate); margin-bottom: 1rem; min-height: 1.2em; }

    .table-wrap { background: var(--white); border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--navy); }
    thead th { padding: 0.85rem 1.1rem; text-align: left; font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #94abbe; }
    tbody tr { border-top: 1px solid var(--rule); transition: background 0.1s; }
    tbody tr:hover { background: var(--teal-lt); }
    tbody td { padding: 0.85rem 1.1rem; font-size: 0.9rem; vertical-align: middle; }
    td:first-child { font-weight: 500; color: #000000; }
    .badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 500; background: var(--teal-lt); color: var(--teal); }
    td:last-child { color: var(--slate); }

    .state-row td { text-align: center; padding: 3rem 1rem; color: var(--slate); font-size: 0.9rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--rule); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { text-align: center; padding: 1.5rem; font-size: 0.75rem; color: #94abbe; }

    @media (max-width: 600px) {
      thead th:nth-child(n+3), tbody td:nth-child(n+3) { display: none; }
    }
  </style>
</head>

<main>
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="search" placeholder="Search projects…" aria-label="Search projects">
    </div>
    <select id="type-filter" aria-label="Filter by project type">
      <option value="">All types</option>
    </select>
  </div>

  <p class="count" id="count" aria-live="polite"></p>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Project Title</th>
          <th>Project Type</th>
          <th>Start Date</th>
          <th>End Date</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr class="state-row">
          <td colspan="4"><span class="spinner"></span> Loading projects…</td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<footer>Data refreshed each time this page loads</footer>

<script>
  const JSON_URL = 'https://raw.githubusercontent.com/SWAL198610/CRIS-projects/main/projects.json';

  const tbody      = document.getElementById('tbody');
  const searchEl   = document.getElementById('search');
  const typeFilter = document.getElementById('type-filter');
  const countEl    = document.getElementById('count');

  let allRows = [];

  async function loadData() {
    try {
      const res = await fetch(JSON_URL + '?t=' + Date.now()); // cache bust
      if (!res.ok) throw new Error('Network response was not ok');
      allRows = await res.json();
      populateTypeFilter();
      render();
    } catch (err) {
      tbody.innerHTML = '<tr class="state-row"><td colspan="4">⚠️ Could not load project data. Please try again later.</td></tr>';
      countEl.textContent = '';
    }
  }

  function populateTypeFilter() {
    const types = [...new Set(allRows.map(r => r['Project Type']).filter(Boolean))].sort();
    types.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      typeFilter.appendChild(opt);
    });
  }

  function render() {
    const q    = searchEl.value.toLowerCase();
    const type = typeFilter.value;

    const filtered = allRows.filter(r => {
      const matchSearch = !q || ['Project Title','Project Type','Start Date','End Date'].some(k => (r[k] || '').toLowerCase().includes(q));
      const matchType   = !type || r['Project Type'] === type;
      return matchSearch && matchType;
    });

    countEl.textContent = filtered.length === allRows.length
      ? filtered.length + ' project' + (filtered.length !== 1 ? 's' : '')
      : filtered.length + ' of ' + allRows.length + ' projects';

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr class="state-row"><td colspan="4">No projects match your search.</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(r =>
      '<tr>' +
        '<td>' + esc(r['Project Title'] || '—') + '</td>' +
        '<td><span class="badge">' + esc(r['Project Type'] || '—') + '</span></td>' +
        '<td>' + esc(r['Start Date'] || '—') + '</td>' +
        '<td>' + esc(r['End Date'] || '—') + '</td>' +
      '</tr>'
    ).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  searchEl.addEventListener('input', render);
  typeFilter.addEventListener('change', render);

  loadData();
</script>
